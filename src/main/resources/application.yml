server:
  port: ${SERVER_PORT:8081}
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    certificate: ${SERVER_SSL_CERT:/etc/tls/tls.crt}
    certificate-private-key: ${SERVER_SSL_KEY:/etc/tls/tls.key}

spring:
  application:
    name: catalog-service
  servlet:
    multipart:
      max-file-size: ${CATALOG_MEDIA_MAX_MULTIPART_SIZE:6MB}
      max-request-size: ${CATALOG_MEDIA_MAX_MULTIPART_REQUEST_SIZE:30MB}
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka.platform.svc.cluster.local:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:SCRAM-SHA-512}
      sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";
      ssl.truststore.location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:/etc/kafka/truststore.jks}
      ssl.truststore.password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:changeit}
      ssl.truststore.type: ${KAFKA_SSL_TRUSTSTORE_TYPE:JKS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloak-platform.apps-crc.testing/realms/master}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:https://keycloak-platform.apps-crc.testing/realms/master/protocol/openid-connect/certs}

catalog:
  translation:
    enabled: ${CATALOG_TRANSLATION_ENABLED:true}
    provider: ${CATALOG_TRANSLATION_PROVIDER:openai}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    timeout-ms: ${CATALOG_TRANSLATION_TIMEOUT_MS:20000}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  media:
    root-path: ${CATALOG_MEDIA_ROOT:/opt/catalog/media}
    max-file-size-bytes: ${CATALOG_MEDIA_MAX_FILE_SIZE:5242880}
    allowed-mime-types: ${CATALOG_MEDIA_ALLOWED_MIME_TYPES:image/jpeg,image/png,image/webp,image/gif}
  events:
    enabled: ${CATALOG_EVENTS_ENABLED:true}
    topic: ${CATALOG_EVENTS_TOPIC:catalog.events}

management:
  endpoints:
    web:
      exposure:
        include: health,info
